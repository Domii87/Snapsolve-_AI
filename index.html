<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">

    <!-- OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <title>Snapsolve AI</title>

    <!-- UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-black text-white">

<video id="video" autoplay style="width:100%"></video>
<button onclick="capture()">📸 Scan</button>

<pre id="result"></pre>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const apiKey = "HIER_DEIN_API_KEY"; // 🔴 EINSETZEN

// Kamera starten
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById('video').srcObject = stream;
});

// Foto machen
function capture() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

    processImage(base64);
}

// OCR Funktion
async function extractText(base64) {
    const res = await Tesseract.recognize(
        `data:image/jpeg;base64,${base64}`,
        'eng'
    );
    return res.data.text;
}

// AI Verarbeitung
async function processImage(base64) {

    document.getElementById("result").innerText = "⏳ Analysiere...";

    try {
        // Schritt 1 OCR
        const text = await extractText(base64);

        if (!text || text.length < 2) {
            document.getElementById("result").innerText = "❌ Kein Text erkannt";
            return;
        }

        // Schritt 2 AI
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + apiKey
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    {
                        role: "user",
                        content: "Löse Schritt für Schritt verständlich:\n\n" + text
                    }
                ]
            })
        });

        const data = await response.json();

        const result = data.choices?.[0]?.message?.content || "Fehler";

        document.getElementById("result").innerText = result;

    } catch (e) {
        document.getElementById("result").innerText = "❌ Fehler bei AI oder OCR";
    }
}
</script>

</body>
</html>
